<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediksi UMKM ANN</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius:20px;
    padding:40px;
    width:700px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,255,255,0.3);
}

h1{
    margin-bottom:20px;
    color:#00ffff;
    text-shadow:0 0 15px #00ffff;
}

input{
    padding:12px;
    width:60%;
    border:none;
    border-radius:10px;
    outline:none;
    margin-top:10px;
    font-size:16px;
    background:rgba(255,255,255,0.1);
    color:white;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00ffff;
    color:black;
    font-weight:bold;
    margin-left:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00cccc;
    box-shadow:0 0 15px #00ffff;
}

.result{
    margin-top:20px;
    font-size:20px;
    color:#00ffcc;
    text-shadow:0 0 10px #00ffcc;
}

img{
    margin-top:20px;
    width:100%;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,255,0.5);
}

.footer{
    margin-top:15px;
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>AI Prediksi UMKM</h1>

<form method="POST">
    <input type="number" name="tahun" placeholder="Masukkan Tahun (contoh 2030)" required>
    <button type="submit">Prediksi</button>
</form>

{% if hasil %}
<div class="result">
Prediksi Jumlah UMKM Tahun {{request.form['tahun']}} : <br>
<b>{{hasil}} Unit</b>
</div>

<img src="{{ url_for('static', filename='grafik.png') }}">
{% endif %}

<div class="footer">
Artificial Neural Network Prediction System
</div>

</div>

</body>
</html>
